# Render Blueprint - Demo Mode
# Deploy with: render blueprint apply

services:
  - type: web
    name: signalbox
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r src/requirements.txt
    startCommand: cd src && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
